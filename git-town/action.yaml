name: Run git-town
description: |
  Requires contents:read and pull-requests:write permissions.

inputs:
  main-branch:
    description: The main branch to use for git-town commands
    default: main

runs:
  using: composite
  steps:
  - name: Checkout
    uses: mobilecoinofficial/gh-actions/checkout@v0
    with:
      submodules: 'false'
  - name: Run git-town
    uses: git-town/action@670e1f4feb81fdef4226fc09deefe09018eb20d1 # v1.3.3
    with:
      main-branch: ${{ inputs.main-branch }}
